apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gohacker
  namespace: gohacker
  labels:
    app: gohacker
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - gohacker.example.com
    secretName: gohacker-tls
  rules:
  - host: gohacker.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: gohacker
            port:
              number: 80
